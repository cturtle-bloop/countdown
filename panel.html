<!doctype html>
<meta charset="utf-8" />
<title>Timer + Dual Clock</title>
<link rel="stylesheet" href="panel.css" />

<body>
    <div class="panel-root">
        <!-- Settings panel (collapsible) -->
        <!-- NEW settings box that contains the gear + collapsible content -->
        <section class="settings-box collapsed" aria-hidden="true">
            <div class="settings-head">
                <button id="settingsBtn" class="icon-btn gear-alone" title="Settings" aria-expanded="false">
                    <svg width="20" height="20" viewBox="0 0 98 98" transform="translate(2 3) scale(1 1)">

                            <circle cx="47.093" cy="27.893" r="5.703"/>
                            <path d="M 45 90 C 20.187 90 0 69.813 0 45 C 0 20.187 20.187 0 45 0 c 24.813 0 45 20.187 45 45 C 90 69.813 69.813 90 45 90 z M 45 7.098 C 24.101 7.098 7.098 24.101 7.098 45 S 24.101 82.902 45 82.902 S 82.902 65.899 82.902 45 S 65.899 7.098 45 7.098 z"/>
                    </svg>
                </button>

                <button id="settingsBtn" class="icon-btn gear-alone" title="Settings" aria-expanded="false">
                    <svg width="20" height="20" viewBox="0 0 98 98" transform="translate(1 2) scale(1 1)">
                        <path d="M 82.94 32.538 c -2.685 0 -5.093 -1.545 -6.327 -3.929 c -0.245 -0.476 -0.504 -0.948 -0.774 -1.416 c -0.27 -0.468 -0.55 -0.928 -0.84 -1.378 c -1.448 -2.26 -1.582 -5.117 -0.239 -7.443 c 1.951 -3.378 0.792 -7.696 -2.584 -9.645 l -9.352 -5.4 c -3.378 -1.951 -7.696 -0.792 -9.645 2.584 l -0.002 0.003 c -1.322 2.291 -3.815 3.641 -6.456 3.512 c -1.149 -0.056 -2.301 -0.057 -3.455 0 c -2.638 0.128 -5.124 -1.226 -6.444 -3.513 l -0.002 -0.002 c -1.951 -3.378 -6.269 -4.535 -9.645 -2.584 l -9.352 5.4 c -3.378 1.951 -4.535 6.269 -2.584 9.645 l 0.002 0.002 c 1.321 2.286 1.25 5.117 -0.18 7.336 c -0.625 0.972 -1.201 1.97 -1.726 2.993 c -1.209 2.353 -3.625 3.836 -6.269 3.836 H 7.063 c -3.9 0 -7.061 3.162 -7.061 7.061 v 10.801 c 0 3.9 3.162 7.061 7.061 7.061 l 0 0 c 2.685 0 5.093 1.545 6.327 3.929 c 0.245 0.475 0.504 0.948 0.774 1.416 c 0.27 0.468 0.55 0.928 0.84 1.378 c 1.448 2.26 1.582 5.117 0.239 7.443 c -1.951 3.378 -0.792 7.696 2.584 9.645 l 9.352 5.4 c 3.378 1.951 7.696 0.792 9.645 -2.584 l 0.002 -0.003 c 1.322 -2.291 3.815 -3.641 6.456 -3.512 c 1.149 0.056 2.301 0.057 3.455 0 c 2.638 -0.128 5.124 1.226 6.444 3.513 l 0.002 0.002 c 1.951 3.378 6.268 4.535 9.645 2.584 l 9.352 -5.4 c 3.378 -1.949 4.535 -6.268 2.584 -9.645 l -0.002 -0.002 c -1.321 -2.286 -1.25 -5.117 0.18 -7.336 c 0.625 -0.972 1.201 -1.97 1.726 -2.993 c 1.209 -2.353 3.625 -3.836 6.269 -3.836 h 0.003 c 3.9 0 7.061 -3.162 7.061 -7.061 V 39.599 C 90.001 35.7 86.84 32.538 82.94 32.538 z M 54.998 62.318 c -9.565 5.523 -21.796 2.245 -27.317 -7.32 c -5.523 -9.565 -2.245 -21.796 7.32 -27.317 s 21.796 -2.245 27.317 7.32 C 67.841 44.566 64.563 56.797 54.998 62.318 z" stroke-linecap="round"/>
                    </svg>
                </button> 
            </div>

            <div class="settings-body">
                <div class="settings-body-inner"><!-- NEW WRAPPER -->
                    <div class="settings-row">
                        <div class="settings-col">
                            <div class="settings-label">Clock format</div>
                            <label class="radio"><input type="radio" name="clockFmt" value="12">h:mm:ss am/pm</label>
                            <label class="radio"><input type="radio" name="clockFmt" value="24">hh:mm:ss</label>
                        </div>
                        <div class="settings-col">
                            <div class="settings-label">Display</div>
                            <label class="check"><input id="optShowProgress" type="checkbox" checked>Show progress
                                bar</label>
                            <label class="check"><input id="optFlashFinish" type="checkbox" checked>Flash on finish</label>
                        </div>
                    </div>
                </div>
            </div>
        </section>


        <!-- Timer (Google-style single input) -->
        <section id="timer-config" class="box">
            <div class="row input-row">
                <span class="muted">Set:</span>
                <div id="timeDisplay" class="clock time-input" title="Type digits, Backspace to erase"></div>
                <input id="digitInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                    aria-label="Timer digits" class="visually-hidden">
            </div>

            <div class="row controls">
                <button id="start" class="btn">Start</button>
                <button id="pause" class="btn" disabled>Pause</button>
                <button id="reset" class="btn" disabled>Reset</button>
                <button id="ack" class="btn" disabled>Acknowledge</button>
                <span class="spacer"></span>
                <!-- (beep removed by request; using flash instead) -->
            </div>
        </section>

        <section id="timer" class="box">
            <div class="row remaining-row">
                <span class="muted">Remaining:</span>
                <span id="remaining" class="clock remaining">00:00:00</span>
            </div>

            <!-- Reverse progress bar -->
            <div id="progressWrap" class="progress-wrap">
                <div id="progressFill" class="progress-fill"></div>
                <div id="progressTicks" class="progress-ticks" aria-hidden="true"></div>
            </div>

            <div class="row last">
                <span class="muted">Last hold completed at:</span>
                <span id="time-finished" class="muted last">--:--:--</span>
                <span class="muted">L</span>
            </div>
        </section>

        <!-- Clocks pinned to bottom -->
        <section id="clocks" class="box clocks">
            <div class="clocks-row">
                <span class="muted">Local:</span>
                <span id="local" class="clock">--:--:--</span>
            </div>
            <div class="clocks-row">
                <span class="muted">Zulu:</span>
                <span id="utc" class="clock muted">--:--:--</span>
            </div>
        </section>
    </div>

    <script src="panel.js"></script>
</body>
